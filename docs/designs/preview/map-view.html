<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapView - 地图视图 - 骑行征服</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0a0a14;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .device-frame {
      width: 375px;
      height: 812px;
      background: #1a1a2e;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 12px #2a2a3e, 0 20px 60px rgba(0,0,0,0.5);
    }

    /* 周循环状态条 */
    .status-bar {
      height: 60px;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid #2a2a3e;
    }

    .phase-indicator {
      color: #00d9ff;
      font-size: 14px;
      font-weight: 500;
    }

    .timer {
      color: #ffffff;
      font-size: 14px;
    }

    /* 地图展示区 */
    .map-container {
      height: 652px;
      background: #1a1a2e;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #666666;
      font-size: 16px;
      line-height: 1.6;
    }

    .map-placeholder-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    /* 领土覆盖层示例 */
    .territory-overlay {
      position: absolute;
      top: 200px;
      left: 100px;
      width: 175px;
      height: 120px;
      background: rgba(0, 217, 255, 0.2);
      border: 2px solid #00d9ff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .territory-label {
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
    }

    /* 定位按钮 */
    .location-button {
      position: absolute;
      bottom: 140px;
      right: 16px;
      width: 44px;
      height: 44px;
      background: #00d9ff;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 217, 255, 0.4);
    }

    /* 缩放控制 */
    .zoom-controls {
      position: absolute;
      bottom: 200px;
      right: 16px;
      width: 44px;
      height: 90px;
      background: #0f0f1a;
      border-radius: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
      padding: 12px 0;
      border: 1px solid #2a2a3e;
    }

    .zoom-btn {
      color: #ffffff;
      font-size: 20px;
      cursor: pointer;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 骑行贡献浮层 */
    .contribution-float {
      position: absolute;
      top: 100px;
      left: 16px;
      right: 16px;
      height: 80px;
      background: #0f0f1a;
      border-radius: 12px;
      border: 1px solid #00d9ff;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0, 217, 255, 0.2);
    }

    .float-title {
      color: #00d9ff;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .float-content {
      color: #ffffff;
      font-size: 18px;
      font-weight: 500;
    }

    /* 底部 Tab 导航 */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: #0f0f1a;
      display: flex;
      border-top: 1px solid #2a2a3e;
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-item.active {
      background: #1a1a2e;
    }

    .tab-icon {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .tab-label {
      font-size: 12px;
    }

    .tab-item.active .tab-icon,
    .tab-item.active .tab-label {
      color: #00d9ff;
    }

    .tab-item:not(.active) .tab-icon,
    .tab-item:not(.active) .tab-label {
      color: #666666;
    }

    /* 设备顶部刘海 */
    .device-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 30px;
      background: #2a2a3e;
      border-radius: 0 0 20px 20px;
      z-index: 100;
    }

    /* 说明文字 */
    .preview-info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #666666;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="device-frame">
    <!-- 设备刘海 -->
    <div class="device-notch"></div>

    <!-- 周循环状态条 -->
    <div class="status-bar">
      <div class="phase-indicator">🔴 对战期 - 还剩 3 天 12:00</div>
      <div class="timer">⏰ 72:00:00</div>
    </div>

    <!-- 地图展示区 -->
    <div class="map-container">
      <!-- 地图占位 -->
      <div class="map-placeholder">
        <span class="map-placeholder-icon">🗺️</span>
        高德地图集成区域<br>
        （全国/省/县区三级下钻）
      </div>

      <!-- 领土覆盖层示例 -->
      <div class="territory-overlay">
        <div class="territory-label">北京市朝阳区</div>
      </div>

      <!-- 定位按钮 -->
      <div class="location-button">📍</div>

      <!-- 缩放控制 -->
      <div class="zoom-controls">
        <div class="zoom-btn">+</div>
        <div class="zoom-btn">−</div>
      </div>

      <!-- 骑行贡献浮层 -->
      <div class="contribution-float">
        <div class="float-title">🚴 你的本次骑行贡献</div>
        <div class="float-content">23km 推动了攻城进度 52% → 58%</div>
      </div>
    </div>

    <!-- 底部 Tab 导航 -->
    <div class="tab-bar">
      <div class="tab-item active">
        <div class="tab-icon">🗺️</div>
        <div class="tab-label">地图</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">👥</div>
        <div class="tab-label">战队</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">🚴</div>
        <div class="tab-label">骑行</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">⚔️</div>
        <div class="tab-label">战斗</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">📊</div>
        <div class="tab-label">战报</div>
      </div>
    </div>
  </div>

  <!-- 说明文字 -->
    <div class="preview-info">
    MapView - 地图视图线框图预览<br>
    文件位置：docs/designs/map-view.pen
  </div>

  <script>
    // 简单的交互效果
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        console.log('Tab clicked:', this.querySelector('.tab-label').textContent);
      });
    });

    document.querySelector('.location-button').addEventListener('click', function() {
      alert('定位功能：将地图中心移动到用户当前位置');
    });

    document.querySelectorAll('.zoom-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        console.log('Zoom:', this.textContent);
      });
    });
  </script>
</body>
</html>
