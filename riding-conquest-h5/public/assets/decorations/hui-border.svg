<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6A3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
    
    <!-- 回纹单元图案 -->
    <pattern id="meanderPattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M0 40 L20 40 L20 20 L40 20 L40 60 L60 60 L60 40 L80 40" 
            stroke="url(#goldGradient)" 
            stroke-width="3" 
            fill="none" 
            opacity="0.8"/>
    </pattern>
  </defs>
  
  <!-- 回纹边框 - 上边 -->
  <rect x="40" y="0" width="944" height="80" fill="url(#meanderPattern)"/>
  
  <!-- 回纹边框 - 下边 -->
  <rect x="40" y="944" width="944" height="80" fill="url(#meanderPattern)"/>
  
  <!-- 回纹边框 - 左边（旋转） -->
  <g transform="translate(40, 40) rotate(-90)">
    <rect x="0" y="0" width="944" height="80" fill="url(#meanderPattern)"/>
  </g>
  
  <!-- 回纹边框 - 右边（旋转） -->
  <g transform="translate(984, 984) rotate(90)">
    <rect x="0" y="0" width="944" height="80" fill="url(#meanderPattern)"/>
  </g>
  
  <!-- 四角装饰 -->
  <!-- 左上角 -->
  <g transform="translate(0, 0)">
    <path d="M0 60 L60 60 L60 0" stroke="url(#goldGradient)" stroke-width="5" fill="none" opacity="1"/>
    <path d="M10 50 L50 50 L50 10" stroke="url(#goldGradient)" stroke-width="3" fill="none" opacity="0.6"/>
  </g>
  
  <!-- 右上角 -->
  <g transform="translate(1024, 0) scale(-1, 1)">
    <path d="M0 60 L60 60 L60 0" stroke="url(#goldGradient)" stroke-width="5" fill="none" opacity="1"/>
    <path d="M10 50 L50 50 L50 10" stroke="url(#goldGradient)" stroke-width="3" fill="none" opacity="0.6"/>
  </g>
  
  <!-- 左下角 -->
  <g transform="translate(0, 1024) scale(1, -1)">
    <path d="M0 60 L60 60 L60 0" stroke="url(#goldGradient)" stroke-width="5" fill="none" opacity="1"/>
    <path d="M10 50 L50 50 L50 10" stroke="url(#goldGradient)" stroke-width="3" fill="none" opacity="0.6"/>
  </g>
  
  <!-- 右下角 -->
  <g transform="translate(1024, 1024) scale(-1, -1)">
    <path d="M0 60 L60 60 L60 0" stroke="url(#goldGradient)" stroke-width="5" fill="none" opacity="1"/>
    <path d="M10 50 L50 50 L50 10" stroke="url(#goldGradient)" stroke-width="3" fill="none" opacity="0.6"/>
  </g>
</svg>
