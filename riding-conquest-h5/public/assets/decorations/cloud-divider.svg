<svg width="800" height="80" viewBox="0 0 800 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6A3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 左侧细线（渐变透明） -->
  <line x1="0" y1="40" x2="280" y2="40" 
        stroke="url(#goldGradient)" 
        stroke-width="2" 
        opacity="0.6">
    <animate attributeName="opacity" values="0;0.6;0" dur="0s" fill="freeze"/>
  </line>
  
  <!-- 左侧渐变线 -->
  <defs>
    <linearGradient id="lineGradientLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="lineGradientRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <line x1="0" y1="40" x2="300" y2="40" 
        stroke="url(#lineGradientLeft)" 
        stroke-width="2"/>
  
  <line x1="500" y1="40" x2="800" y2="40" 
        stroke="url(#lineGradientRight)" 
        stroke-width="2"/>
  
  <!-- 中央祥云装饰 -->
  <g transform="translate(400, 40)">
    <!-- 外层祥云 -->
    <path d="M0 25 
             Q-20 15, 0 5 
             Q-15 -15, 15 -10 
             Q30 -25, 50 -10 
             Q70 -15, 85 5 
             Q105 15, 85 25 
             Q100 40, 75 35 
             Q60 50, 35 40 
             Q15 50, -10 40 
             Q-25 50, -40 35 
             Q-60 40, -50 20 
             Q-70 10, -50 0 
             Q-60 -10, -40 -15 
             Q-30 -30, -10 -20 
             Q0 -30, 0 25 Z" 
          fill="url(#goldGradient)" 
          opacity="0.3"/>
    
    <!-- 内层祥云 -->
    <path d="M0 18 
             Q-15 10, 0 3 
             Q-10 -8, 8 -5 
             Q20 -15, 35 -5 
             Q50 -8, 60 5 
             Q75 10, 60 18 
             Q70 28, 55 25 
             Q45 35, 25 28 
             Q10 35, -8 28 
             Q-20 35, -30 25 
             Q-45 28, -38 15 
             Q-50 8, -38 0 
             Q-45 -8, -30 -10 
             Q-20 -20, -8 -12 
             Q0 -20, 0 18 Z" 
          fill="url(#goldGradient)" 
          opacity="0.5"/>
    
    <!-- 祥云纹理 -->
    <path d="M-20 5 Q0 -5, 20 5" 
          stroke="url(#goldGradient)" 
          stroke-width="1.5" 
          fill="none" 
          opacity="0.7"/>
    <path d="M-30 15 Q0 5, 30 15" 
          stroke="url(#goldGradient)" 
          stroke-width="1" 
          fill="none" 
          opacity="0.5"/>
    
    <!-- 装饰圆点 -->
    <circle cx="-15" cy="8" r="2" fill="#D4AF37" opacity="0.6"/>
    <circle cx="15" cy="8" r="2" fill="#D4AF37" opacity="0.6"/>
    <circle cx="0" cy="-5" r="1.5" fill="#D4AF37" opacity="0.6"/>
  </g>
</svg>
