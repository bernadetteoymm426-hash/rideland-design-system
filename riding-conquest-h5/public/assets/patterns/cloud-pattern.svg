<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 云纹背景图案 -->
  <defs>
    <pattern id="cloudPattern" x="0" y="0" width="100" height="50" patternUnits="userSpaceOnUse">
      <path d="M10 25 Q20 15, 30 25 T50 25 T70 25 T90 25" 
            stroke="#D4AF37" 
            stroke-width="1" 
            fill="none" 
            opacity="0.3"/>
      <circle cx="15" cy="25" r="3" fill="#D4AF37" opacity="0.2"/>
      <circle cx="35" cy="25" r="2" fill="#D4AF37" opacity="0.2"/>
      <circle cx="55" cy="25" r="2.5" fill="#D4AF37" opacity="0.2"/>
    </pattern>
    
    <!-- 回纹边框图案 -->
    <pattern id="meanderPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 10 L5 10 L5 5 L10 5 L10 15 L15 15 L15 10 L20 10" 
            stroke="#D4AF37" 
            stroke-width="1.5" 
            fill="none" 
            opacity="0.5"/>
    </pattern>
    
    <!-- 海浪纹 -->
    <pattern id="wavePattern" x="0" y="0" width="80" height="30" patternUnits="userSpaceOnUse">
      <path d="M0 15 Q10 5, 20 15 T40 15 T60 15 T80 15" 
            stroke="#D4AF37" 
            stroke-width="1" 
            fill="none" 
            opacity="0.4"/>
      <path d="M0 20 Q10 10, 20 20 T40 20 T60 20 T80 20" 
            stroke="#D4AF37" 
            stroke-width="0.5" 
            fill="none" 
            opacity="0.2"/>
    </pattern>
    
    <!-- 渐变定义 -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="deepBlueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B263B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 示例使用 -->
  <rect width="400" height="200" fill="url(#deepBlueGradient)"/>
  <rect width="400" height="200" fill="url(#cloudPattern)"/>
</svg>
