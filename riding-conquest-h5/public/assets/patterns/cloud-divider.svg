<svg width="200" height="40" viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg">
  <!-- 云纹分隔线 -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 主云纹线 -->
  <path d="M10 20 
           Q20 10, 30 20 
           T50 20 
           T70 20 
           T90 20 
           T110 20 
           T130 20 
           T150 20 
           T170 20 
           T190 20" 
        stroke="url(#goldGradient)" 
        stroke-width="2" 
        fill="none"
        stroke-linecap="round"/>
  
  <!-- 装饰小圆点 -->
  <circle cx="20" cy="20" r="2" fill="#D4AF37" opacity="0.6"/>
  <circle cx="50" cy="20" r="2" fill="#D4AF37" opacity="0.6"/>
  <circle cx="80" cy="20" r="2" fill="#D4AF37" opacity="0.6"/>
  <circle cx="110" cy="20" r="2" fill="#D4AF37" opacity="0.6"/>
  <circle cx="140" cy="20" r="2" fill="#D4AF37" opacity="0.6"/>
  <circle cx="170" cy="20" r="2" fill="#D4AF37" opacity="0.6"/>
  
  <!-- 两端装饰 -->
  <path d="M5 20 L2 20 M195 20 L198 20" stroke="#D4AF37" stroke-width="2"/>
  <circle cx="2" cy="20" r="3" fill="#D4AF37"/>
  <circle cx="198" cy="20" r="3" fill="#D4AF37"/>
</svg>
