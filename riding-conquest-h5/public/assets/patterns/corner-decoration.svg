<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 四角装饰 - 用于卡片角落 -->
  <g fill="none" stroke="url(#goldGradient)" stroke-width="2">
    <!-- 左上角 -->
    <path d="M0 20 L0 5 L5 5 L5 0 L20 0" stroke-linecap="round"/>
    <circle cx="5" cy="5" r="2" fill="#D4AF37"/>
    
    <!-- 右上角 -->
    <path d="M80 0 L95 0 L95 5 L100 5 L100 20" stroke-linecap="round"/>
    <circle cx="95" cy="5" r="2" fill="#D4AF37"/>
    
    <!-- 左下角 -->
    <path d="M0 80 L0 95 L5 95 L5 100 L20 100" stroke-linecap="round"/>
    <circle cx="5" cy="95" r="2" fill="#D4AF37"/>
    
    <!-- 右下角 -->
    <path d="M80 100 L95 100 L95 95 L100 95 L100 80" stroke-linecap="round"/>
    <circle cx="95" cy="95" r="2" fill="#D4AF37"/>
  </g>
  
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
