<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑迹大陆 - 战报浮层设计</title>
    <style>
        :root {
            --deep-space: #070E1B;
            --tech-blue: #3B82F6;
            --emerald-green: #10B981;
            --victory-gold: #F59E0B;
            --passion-red: #EF4444;
            --light-gray: #F1F5F9;
            --medium-gray: #94A3B8;
            --dark-gray: #64748B;
            --card-bg: rgba(26, 39, 64, 0.95);
            --card-border: rgba(59, 130, 246, 0.3);
            --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--deep-space);
            color: var(--light-gray);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .overlay-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            width: 700px;
            max-width: 90%;
            max-height: 85vh;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            animation: overlay-enter 0.4s var(--ease-standard);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @keyframes overlay-enter {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .overlay-header {
            padding: 32px;
            text-align: center;
            background: linear-gradient(180deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(245, 158, 11, 0.2);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            color: var(--medium-gray);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--light-gray);
        }

        .trophy-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #FBBF24 0%, var(--victory-gold) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.4);
            animation: trophy-glow 2s ease-in-out infinite;
        }

        @keyframes trophy-glow {
            0%, 100% { box-shadow: 0 0 40px rgba(245, 158, 11, 0.4); }
            50% { box-shadow: 0 0 60px rgba(245, 158, 11, 0.6); }
        }

        .trophy-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .header-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--medium-gray);
        }

        .overlay-content {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
        }

        .rank-change {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .rank-item {
            text-align: center;
        }

        .rank-label {
            font-size: 12px;
            color: var(--medium-gray);
            margin-bottom: 4px;
        }

        .rank-value {
            font-size: 36px;
            font-weight: 700;
        }

        .rank-value.old {
            color: var(--medium-gray);
            text-decoration: line-through;
        }

        .rank-value.new {
            color: var(--victory-gold);
        }

        .rank-arrow {
            font-size: 32px;
            color: var(--emerald-green);
            animation: arrow-bounce 1s ease-in-out infinite;
        }

        @keyframes arrow-bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(4px); }
        }

        .summary-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
        }

        .summary-stat {
            text-align: center;
        }

        .summary-stat .value {
            font-size: 24px;
            font-weight: 700;
            color: var(--emerald-green);
        }

        .summary-stat .label {
            font-size: 12px;
            color: var(--medium-gray);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title svg {
            width: 18px;
            height: 18px;
            color: var(--tech-blue);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .stat-card .icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-card .icon svg {
            width: 22px;
            height: 22px;
        }

        .stat-card .icon.blue {
            background: rgba(59, 130, 246, 0.2);
            color: var(--tech-blue);
        }

        .stat-card .icon.green {
            background: rgba(16, 185, 129, 0.2);
            color: var(--emerald-green);
        }

        .stat-card .icon.gold {
            background: rgba(245, 158, 11, 0.2);
            color: var(--victory-gold);
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-card .value.blue { color: var(--tech-blue); }
        .stat-card .value.green { color: var(--emerald-green); }
        .stat-card .value.gold { color: var(--victory-gold); }

        .stat-card .label {
            font-size: 12px;
            color: var(--medium-gray);
        }

        .achievements-section {
            margin-bottom: 24px;
        }

        .achievement-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .achievement-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .achievement-item svg {
            width: 24px;
            height: 24px;
            color: var(--victory-gold);
        }

        .achievement-item .text {
            font-size: 13px;
            font-weight: 600;
        }

        .narrative-box {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, transparent 100%);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .narrative-box p {
            font-size: 15px;
            line-height: 1.7;
            color: var(--light-gray);
        }

        .narrative-box .highlight {
            color: var(--emerald-green);
            font-weight: 600;
        }

        .narrative-box .gold {
            color: var(--victory-gold);
            font-weight: 600;
        }

        .overlay-footer {
            padding: 20px 32px;
            border-top: 1px solid rgba(59, 130, 246, 0.15);
            display: flex;
            gap: 16px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s var(--ease-standard);
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        .btn-share {
            background: linear-gradient(180deg, #FBBF24 0%, var(--victory-gold) 100%);
            color: #000;
        }

        .btn-share:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--light-gray);
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>
    <div class="overlay-backdrop">
        <div class="overlay">
            <div class="overlay-header">
                <button class="close-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <div class="trophy-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                    </svg>
                </div>
                <h2 class="header-title">第 12 赛季 · 第 3 周战报</h2>
                <p class="header-subtitle">闪电车队的本周征程</p>
            </div>

            <div class="overlay-content">
                <div class="summary-card">
                    <div class="rank-change">
                        <div class="rank-item">
                            <div class="rank-label">上周排名</div>
                            <div class="rank-value old">#5</div>
                        </div>
                        <div class="rank-arrow">→</div>
                        <div class="rank-item">
                            <div class="rank-label">本周排名</div>
                            <div class="rank-value new">#3</div>
                        </div>
                    </div>
                    <div class="summary-stats">
                        <div class="summary-stat">
                            <div class="value">+3</div>
                            <div class="label">领土增长</div>
                        </div>
                        <div class="summary-stat">
                            <div class="value">4</div>
                            <div class="label">成功进攻</div>
                        </div>
                        <div class="summary-stat">
                            <div class="value">8</div>
                            <div class="label">成功防守</div>
                        </div>
                    </div>
                </div>

                <h3 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    你的本周表现
                </h3>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="icon blue">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </div>
                        <div class="value blue">234</div>
                        <div class="label">骑行里程 (km)</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon green">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14.5 17.5L3 6V3h3l11.5 11.5"/>
                            </svg>
                        </div>
                        <div class="value green">4</div>
                        <div class="label">参与进攻</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon gold">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                        </div>
                        <div class="value gold">2</div>
                        <div class="label">成功防守</div>
                    </div>
                </div>

                <div class="achievements-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="8" r="7"/>
                            <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
                        </svg>
                        本周成就
                    </h3>
                    <div class="achievement-list">
                        <div class="achievement-item">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                            </svg>
                            <span class="text">周贡献 TOP 10</span>
                        </div>
                        <div class="achievement-item">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2z"/>
                            </svg>
                            <span class="text">攻城先锋</span>
                        </div>
                        <div class="achievement-item">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                            </svg>
                            <span class="text">守护者</span>
                        </div>
                    </div>
                </div>

                <div class="narrative-box">
                    <p>
                        本周你的 <span class="highlight">234km</span> 骑行里程为战队贡献了 <span class="gold">+35%</span> 的攻城进度！
                        你的出色表现帮助战队成功拿下上海、杭州、苏州三座城市，排名从 #5 跃升至 #3。
                        继续保持，下周冲击冠军宝座！ 🏆
                    </p>
                </div>
            </div>

            <div class="overlay-footer">
                <button class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    查看详情
                </button>
                <button class="btn btn-share">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3"/>
                        <circle cx="6" cy="12" r="3"/>
                        <circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    分享战报
                </button>
            </div>
        </div>
    </div>
</body>
</html>
