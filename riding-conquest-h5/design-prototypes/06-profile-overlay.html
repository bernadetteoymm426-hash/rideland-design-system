<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑迹大陆 - 个人浮层设计</title>
    <style>
        :root {
            --deep-space: #070E1B;
            --tech-blue: #3B82F6;
            --emerald-green: #10B981;
            --victory-gold: #F59E0B;
            --passion-red: #EF4444;
            --light-gray: #F1F5F9;
            --medium-gray: #94A3B8;
            --dark-gray: #64748B;
            --card-bg: rgba(26, 39, 64, 0.95);
            --card-border: rgba(59, 130, 246, 0.3);
            --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--deep-space);
            color: var(--light-gray);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .overlay-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            width: 450px;
            max-width: 90%;
            max-height: 85vh;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            animation: overlay-enter 0.4s var(--ease-standard);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @keyframes overlay-enter {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .overlay-header {
            padding: 32px;
            text-align: center;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            color: var(--medium-gray);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--light-gray);
        }

        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1E40AF 0%, var(--tech-blue) 100%);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            border: 3px solid var(--tech-blue);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            position: relative;
        }

        .level-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: linear-gradient(180deg, #FBBF24 0%, var(--victory-gold) 100%);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            border: 2px solid var(--deep-space);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-title {
            font-size: 14px;
            color: var(--victory-gold);
            margin-bottom: 8px;
        }

        .profile-team {
            font-size: 13px;
            color: var(--medium-gray);
        }

        .overlay-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .stats-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--medium-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-box .value.blue { color: var(--tech-blue); }
        .stat-box .value.green { color: var(--emerald-green); }
        .stat-box .value.gold { color: var(--victory-gold); }

        .stat-box .label {
            font-size: 11px;
            color: var(--medium-gray);
        }

        .achievements-section {
            margin-bottom: 24px;
        }

        .achievement-badges {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .achievement-badge {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .achievement-badge:hover {
            transform: scale(1.1);
        }

        .achievement-badge.gold {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.3) 0%, rgba(245, 158, 11, 0.1) 100%);
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

        .achievement-badge.silver {
            background: linear-gradient(135deg, rgba(156, 163, 175, 0.3) 0%, rgba(156, 163, 175, 0.1) 100%);
            border: 1px solid rgba(156, 163, 175, 0.4);
        }

        .achievement-badge.bronze {
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.3) 0%, rgba(217, 119, 6, 0.1) 100%);
            border: 1px solid rgba(217, 119, 6, 0.4);
        }

        .achievement-badge svg {
            width: 24px;
            height: 24px;
        }

        .achievement-badge.gold svg { color: var(--victory-gold); }
        .achievement-badge.silver svg { color: var(--silver); }
        .achievement-badge.bronze svg { color: var(--bronze); }

        .achievement-badge .count {
            font-size: 10px;
            font-weight: 600;
            color: var(--medium-gray);
        }

        .settings-section {
            margin-bottom: 8px;
        }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .setting-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .setting-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .setting-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .setting-icon svg {
            width: 18px;
            height: 18px;
            color: var(--tech-blue);
        }

        .setting-text {
            font-size: 14px;
            font-weight: 500;
        }

        .setting-arrow {
            color: var(--medium-gray);
        }

        .setting-arrow svg {
            width: 16px;
            height: 16px;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: var(--tech-blue);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.2s;
        }

        .toggle-switch.active::after {
            transform: translateX(20px);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: var(--passion-red);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--passion-red);
        }

        .logout-btn svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>
    <div class="overlay-backdrop">
        <div class="overlay">
            <div class="overlay-header">
                <button class="close-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <div class="profile-avatar">
                    骑
                    <span class="level-badge">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                        </svg>
                        Lv.28
                    </span>
                </div>
                <h2 class="profile-name">骑行勇士</h2>
                <p class="profile-title">⚔️ 攻城先锋</p>
                <p class="profile-team">闪电车队 · 精英成员</p>
            </div>

            <div class="overlay-content">
                <div class="stats-section">
                    <h3 class="section-title">本周数据</h3>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="value blue">234</div>
                            <div class="label">里程 (km)</div>
                        </div>
                        <div class="stat-box">
                            <div class="value green">4</div>
                            <div class="label">进攻</div>
                        </div>
                        <div class="stat-box">
                            <div class="value gold">2</div>
                            <div class="label">防守</div>
                        </div>
                    </div>
                </div>

                <div class="achievements-section">
                    <h3 class="section-title">累计成就</h3>
                    <div class="achievement-badges">
                        <div class="achievement-badge gold" title="攻城先锋">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                            </svg>
                            <span class="count">×3</span>
                        </div>
                        <div class="achievement-badge gold" title="守护者">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                            </svg>
                            <span class="count">×2</span>
                        </div>
                        <div class="achievement-badge silver" title="骑行达人">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M15.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM5 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5z"/>
                            </svg>
                            <span class="count">×5</span>
                        </div>
                        <div class="achievement-badge bronze" title="贡献之星">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2z"/>
                            </svg>
                            <span class="count">×8</span>
                        </div>
                        <div class="achievement-badge bronze" title="里程碑">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-8 8z"/>
                            </svg>
                            <span class="count">×12</span>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 class="section-title">设置</h3>
                    <div class="settings-list">
                        <div class="setting-item">
                            <div class="setting-left">
                                <div class="setting-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                                        <circle cx="12" cy="10" r="3"/>
                                    </svg>
                                </div>
                                <span class="setting-text">家乡设置</span>
                            </div>
                            <span class="setting-arrow">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"/>
                                </svg>
                            </span>
                        </div>

                        <div class="setting-item">
                            <div class="setting-left">
                                <div class="setting-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                                    </svg>
                                </div>
                                <span class="setting-text">消息通知</span>
                            </div>
                            <div class="toggle-switch active"></div>
                        </div>

                        <div class="setting-item">
                            <div class="setting-left">
                                <div class="setting-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="5"/>
                                        <line x1="12" y1="1" x2="12" y2="3"/>
                                        <line x1="12" y1="21" x2="12" y2="23"/>
                                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                                        <line x1="1" y1="12" x2="3" y2="12"/>
                                        <line x1="21" y1="12" x2="23" y2="12"/>
                                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                                    </svg>
                                </div>
                                <span class="setting-text">深色模式</span>
                            </div>
                            <div class="toggle-switch active"></div>
                        </div>

                        <div class="setting-item">
                            <div class="setting-left">
                                <div class="setting-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"/>
                                        <line x1="12" y1="16" x2="12" y2="12"/>
                                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                                    </svg>
                                </div>
                                <span class="setting-text">关于骑迹大陆</span>
                            </div>
                            <span class="setting-arrow">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"/>
                                </svg>
                            </span>
                        </div>
                    </div>

                    <button class="logout-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        退出登录
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.toggle-switch').forEach(toggle => {
            toggle.addEventListener('click', function() {
                this.classList.toggle('active');
            });
        });
    </script>
</body>
</html>
