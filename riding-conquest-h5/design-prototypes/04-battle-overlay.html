<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑迹大陆 - 作战浮层设计</title>
    <style>
        :root {
            --deep-space: #070E1B;
            --tech-blue: #3B82F6;
            --emerald-green: #10B981;
            --victory-gold: #F59E0B;
            --passion-red: #EF4444;
            --light-gray: #F1F5F9;
            --medium-gray: #94A3B8;
            --dark-gray: #64748B;
            --card-bg: rgba(26, 39, 64, 0.95);
            --card-border: rgba(59, 130, 246, 0.3);
            --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--deep-space);
            color: var(--light-gray);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .overlay-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            width: 900px;
            max-width: 90%;
            max-height: 85vh;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            animation: overlay-enter 0.4s var(--ease-standard);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @keyframes overlay-enter {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .overlay-header {
            padding: 20px 32px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--passion-red) 0%, #DC2626 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon svg {
            width: 22px;
            height: 22px;
            color: white;
        }

        .phase-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px;
        }

        .phase-dot {
            width: 8px;
            height: 8px;
            background: var(--tech-blue);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .phase-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--tech-blue);
        }

        .close-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            color: var(--medium-gray);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--light-gray);
        }

        .overlay-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            padding: 24px 32px;
            overflow-y: auto;
        }

        .panel {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.1);
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--light-gray);
        }

        .panel-header svg {
            width: 18px;
            height: 18px;
            color: var(--tech-blue);
        }

        .panel-content {
            padding: 20px;
        }

        .current-attack {
            text-align: center;
        }

        .attack-target {
            margin-bottom: 24px;
        }

        .target-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--passion-red);
        }

        .target-owner {
            font-size: 14px;
            color: var(--medium-gray);
            margin-bottom: 16px;
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .progress-label {
            color: var(--medium-gray);
        }

        .progress-value {
            color: var(--emerald-green);
            font-weight: 600;
        }

        .progress-bar {
            height: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--emerald-green), #34D399);
            border-radius: 6px;
            position: relative;
            transition: width 0.5s var(--ease-standard);
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 20px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
            animation: progress-shine 2s ease-in-out infinite;
        }

        @keyframes progress-shine {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .stat-box .value {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-box .label {
            font-size: 11px;
            color: var(--medium-gray);
        }

        .countdown-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .countdown-label {
            font-size: 12px;
            color: var(--medium-gray);
            margin-bottom: 8px;
        }

        .countdown-timer {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 32px;
            font-weight: 700;
            color: var(--passion-red);
        }

        .target-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .target-list::-webkit-scrollbar {
            width: 4px;
        }

        .target-list::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 2px;
        }

        .target-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .target-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .target-item.selected {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--tech-blue);
        }

        .target-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .target-icon.enemy {
            background: linear-gradient(135deg, #DC2626 0%, var(--passion-red) 100%);
        }

        .target-icon.neutral {
            background: linear-gradient(135deg, #4B5563 0%, var(--dark-gray) 100%);
        }

        .target-info {
            flex: 1;
        }

        .target-info .name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .target-info .meta {
            font-size: 12px;
            color: var(--medium-gray);
        }

        .target-stats {
            text-align: right;
        }

        .target-stats .defense {
            font-size: 16px;
            font-weight: 700;
            color: var(--passion-red);
            margin-bottom: 2px;
        }

        .target-stats .rating {
            font-size: 11px;
            color: var(--victory-gold);
        }

        .strategic-value {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .strategic-value svg {
            width: 12px;
            height: 12px;
            color: var(--victory-gold);
        }

        .overlay-footer {
            padding: 20px 32px;
            border-top: 1px solid rgba(59, 130, 246, 0.15);
            display: flex;
            gap: 16px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s var(--ease-standard);
        }

        .btn svg {
            width: 22px;
            height: 22px;
        }

        .btn-attack {
            background: linear-gradient(180deg, #F87171 0%, var(--passion-red) 100%);
            color: white;
        }

        .btn-attack:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--light-gray);
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .no-attack {
            text-align: center;
            padding: 40px 20px;
            color: var(--medium-gray);
        }

        .no-attack svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="overlay-backdrop">
        <div class="overlay">
            <div class="overlay-header">
                <div class="header-title">
                    <div class="header-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14.5 17.5L3 6V3h3l11.5 11.5"/>
                            <path d="M13 19l6-6"/>
                            <path d="M16 16l4 4"/>
                            <path d="M19 21l2-2"/>
                        </svg>
                    </div>
                    <h2>作战指挥</h2>
                </div>
                <div class="phase-badge">
                    <span class="phase-dot"></span>
                    <span class="phase-text">⚔️ 对战期</span>
                </div>
                <button class="close-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <div class="overlay-content">
                <div class="left-panel">
                    <div class="panel">
                        <div class="panel-header">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                            正在进攻
                        </div>
                        <div class="panel-content current-attack">
                            <div class="attack-target">
                                <div class="target-name">上海</div>
                                <div class="target-owner">占领方：魔骑行</div>
                            </div>

                            <div class="progress-section">
                                <div class="progress-header">
                                    <span class="progress-label">攻城进度</span>
                                    <span class="progress-value">68%</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: 68%;"></div>
                                </div>
                            </div>

                            <div class="stats-grid">
                                <div class="stat-box">
                                    <div class="value" style="color: var(--emerald-green);">456</div>
                                    <div class="label">已骑行 (km)</div>
                                </div>
                                <div class="stat-box">
                                    <div class="value" style="color: var(--tech-blue);">24</div>
                                    <div class="label">参战成员</div>
                                </div>
                                <div class="stat-box">
                                    <div class="value" style="color: var(--victory-gold);">78</div>
                                    <div class="label">敌方防御</div>
                                </div>
                                <div class="stat-box">
                                    <div class="value" style="color: var(--passion-red);">214</div>
                                    <div class="label">剩余距离 (km)</div>
                                </div>
                            </div>

                            <div class="countdown-box">
                                <div class="countdown-label">攻势倒计时</div>
                                <div class="countdown-timer">2:14:32:08</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="panel">
                        <div class="panel-header">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                            可进攻目标
                        </div>
                        <div class="panel-content">
                            <div class="target-list">
                                <div class="target-item selected">
                                    <div class="target-icon enemy">🎯</div>
                                    <div class="target-info">
                                        <div class="name">上海</div>
                                        <div class="meta">魔骑行 · 距你 45km</div>
                                    </div>
                                    <div class="target-stats">
                                        <div class="defense">防御 78</div>
                                        <div class="rating strategic-value">
                                            <svg viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                                            </svg>
                                            高价值
                                        </div>
                                    </div>
                                </div>

                                <div class="target-item">
                                    <div class="target-icon enemy">⚔️</div>
                                    <div class="target-info">
                                        <div class="name">杭州</div>
                                        <div class="meta">骑行者联盟 · 距你 120km</div>
                                    </div>
                                    <div class="target-stats">
                                        <div class="defense">防御 65</div>
                                        <div class="rating strategic-value">
                                            <svg viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                                            </svg>
                                            中价值
                                        </div>
                                    </div>
                                </div>

                                <div class="target-item">
                                    <div class="target-icon neutral">🏳️</div>
                                    <div class="target-info">
                                        <div class="name">南京</div>
                                        <div class="meta">无主之地 · 距你 200km</div>
                                    </div>
                                    <div class="target-stats">
                                        <div class="defense" style="color: var(--dark-gray);">防御 0</div>
                                        <div class="rating strategic-value">
                                            <svg viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                                            </svg>
                                            低价值
                                        </div>
                                    </div>
                                </div>

                                <div class="target-item">
                                    <div class="target-icon enemy">🏰</div>
                                    <div class="target-info">
                                        <div class="name">苏州</div>
                                        <div class="meta">闪电侠 · 距你 80km</div>
                                    </div>
                                    <div class="target-stats">
                                        <div class="defense">防御 82</div>
                                        <div class="rating strategic-value">
                                            <svg viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                                            </svg>
                                            高价值
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="overlay-footer">
                <button class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    防守我的领土
                </button>
                <button class="btn btn-attack">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
                    </svg>
                    发起征服
                </button>
            </div>
        </div>
    </div>
</body>
</html>
