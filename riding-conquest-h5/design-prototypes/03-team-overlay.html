<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑迹大陆 - 战队浮层设计</title>
    <style>
        :root {
            --deep-space: #070E1B;
            --tech-blue: #3B82F6;
            --emerald-green: #10B981;
            --victory-gold: #F59E0B;
            --passion-red: #EF4444;
            --light-gray: #F1F5F9;
            --medium-gray: #94A3B8;
            --dark-gray: #64748B;
            --card-bg: rgba(26, 39, 64, 0.95);
            --card-border: rgba(59, 130, 246, 0.3);
            --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--deep-space);
            color: var(--light-gray);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .overlay-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            width: 800px;
            max-width: 90%;
            max-height: 80vh;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            animation: overlay-enter 0.4s var(--ease-standard);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @keyframes overlay-enter {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .overlay-header {
            padding: 24px 32px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .team-header {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .team-badge {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, #1E40AF 0%, var(--tech-blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 0 24px rgba(59, 130, 246, 0.4);
        }

        .team-info h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(180deg, #FBBF24 0%, var(--victory-gold) 100%);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .team-tagline {
            font-size: 14px;
            color: var(--medium-gray);
        }

        .close-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            color: var(--medium-gray);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--light-gray);
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 20px 32px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
            flex-shrink: 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-value.blue { color: var(--tech-blue); }
        .stat-value.green { color: var(--emerald-green); }
        .stat-value.gold { color: var(--victory-gold); }

        .stat-label {
            font-size: 13px;
            color: var(--medium-gray);
        }

        .overlay-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .overlay-content::-webkit-scrollbar {
            width: 6px;
        }

        .overlay-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .overlay-content::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 3px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--light-gray);
        }

        .section-title svg {
            width: 18px;
            height: 18px;
            color: var(--tech-blue);
        }

        .member-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .member-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .member-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1E40AF 0%, var(--tech-blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            position: relative;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--emerald-green);
            border: 2px solid var(--deep-space);
            border-radius: 50%;
        }

        .online-indicator.offline {
            background: var(--dark-gray);
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .role-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
        }

        .role-badge.leader {
            background: rgba(245, 158, 11, 0.2);
            color: var(--victory-gold);
        }

        .role-badge.elite {
            background: rgba(59, 130, 246, 0.2);
            color: var(--tech-blue);
        }

        .role-badge.member {
            background: rgba(148, 163, 184, 0.2);
            color: var(--medium-gray);
        }

        .member-stats {
            font-size: 13px;
            color: var(--medium-gray);
        }

        .member-contribution {
            text-align: right;
        }

        .contribution-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--emerald-green);
        }

        .contribution-label {
            font-size: 11px;
            color: var(--medium-gray);
        }

        .overlay-footer {
            padding: 20px 32px;
            border-top: 1px solid rgba(59, 130, 246, 0.15);
            display: flex;
            gap: 16px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s var(--ease-standard);
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        .btn-primary {
            background: linear-gradient(180deg, #60A5FA 0%, var(--tech-blue) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--light-gray);
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .btn-danger {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--passion-red);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--passion-red);
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--medium-gray);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 10px;
        }

        .tab {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: var(--medium-gray);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: var(--tech-blue);
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="overlay-backdrop">
        <div class="overlay">
            <div class="overlay-header">
                <div class="team-header">
                    <div class="team-badge">⚡</div>
                    <div class="team-info">
                        <h2>
                            闪电车队
                            <span class="level-badge">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                                </svg>
                                Lv.28
                            </span>
                        </h2>
                        <span class="team-tagline">骑行即征服 · 每一公里都在创造奇迹</span>
                    </div>
                </div>
                <button class="close-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value blue">24</div>
                    <div class="stat-label">成员</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value green">47</div>
                    <div class="stat-label">领土</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value gold">#5</div>
                    <div class="stat-label">排名</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value blue">12,456</div>
                    <div class="stat-label">总里程 (km)</div>
                </div>
            </div>

            <div class="overlay-content">
                <div class="tabs">
                    <button class="tab active">成员</button>
                    <button class="tab">公告</button>
                    <button class="tab">管理</button>
                </div>

                <div class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    成员列表
                </div>

                <div class="member-list">
                    <div class="member-item">
                        <div class="member-avatar">
                            王
                            <span class="online-indicator"></span>
                        </div>
                        <div class="member-info">
                            <div class="member-name">
                                王者归来
                                <span class="role-badge leader">队长</span>
                            </div>
                            <div class="member-stats">本周 156km · 加入 128 天</div>
                        </div>
                        <div class="member-contribution">
                            <div class="contribution-value">2,456</div>
                            <div class="contribution-label">贡献值</div>
                        </div>
                    </div>

                    <div class="member-item">
                        <div class="member-avatar">
                            李
                            <span class="online-indicator"></span>
                        </div>
                        <div class="member-info">
                            <div class="member-name">
                                骑行者小李
                                <span class="role-badge elite">精英</span>
                            </div>
                            <div class="member-stats">本周 89km · 加入 96 天</div>
                        </div>
                        <div class="member-contribution">
                            <div class="contribution-value">1,832</div>
                            <div class="contribution-label">贡献值</div>
                        </div>
                    </div>

                    <div class="member-item">
                        <div class="member-avatar">
                            张
                            <span class="online-indicator offline"></span>
                        </div>
                        <div class="member-info">
                            <div class="member-name">
                                风驰电掣
                                <span class="role-badge elite">精英</span>
                            </div>
                            <div class="member-stats">本周 67km · 加入 84 天</div>
                        </div>
                        <div class="member-contribution">
                            <div class="contribution-value">1,567</div>
                            <div class="contribution-label">贡献值</div>
                        </div>
                    </div>

                    <div class="member-item">
                        <div class="member-avatar" style="background: linear-gradient(135deg, #059669 0%, var(--emerald-green) 100%);">
                            我
                            <span class="online-indicator"></span>
                        </div>
                        <div class="member-info">
                            <div class="member-name">
                                骑行勇士
                                <span class="role-badge member">成员</span>
                            </div>
                            <div class="member-stats">本周 45km · 加入 32 天</div>
                        </div>
                        <div class="member-contribution">
                            <div class="contribution-value">892</div>
                            <div class="contribution-label">贡献值</div>
                        </div>
                    </div>

                    <div class="member-item">
                        <div class="member-avatar">
                            陈
                            <span class="online-indicator offline"></span>
                        </div>
                        <div class="member-info">
                            <div class="member-name">
                                山地之王
                                <span class="role-badge member">成员</span>
                            </div>
                            <div class="member-stats">本周 23km · 加入 18 天</div>
                        </div>
                        <div class="member-contribution">
                            <div class="contribution-value">456</div>
                            <div class="contribution-label">贡献值</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="overlay-footer">
                <button class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                    邀请好友
                </button>
                <button class="btn btn-danger">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    退出战队
                </button>
            </div>
        </div>
    </div>
</body>
</html>
